name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tmis
          POSTGRES_PASSWORD: tmis
          POSTGRES_DB: tmis
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tmis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,ci]"

      - name: Static analysis (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src

      - name: Security scan - static analysis (bandit)
        run: bandit -r src -ll -f txt -o bandit-report.txt
        continue-on-error: true

      - name: Security scan - dependency vulnerabilities (pip-audit)
        run: pip-audit --skip-editable -f json -o pip-audit-report.json
        continue-on-error: true

      - name: Tests + coverage
        run: pytest --cov=tmis --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=90
        env:
          TMIS_DATABASE_URL: postgresql+psycopg://tmis:tmis@localhost:5432/tmis

      - name: Generate API documentation (pdoc)
        run: pdoc --output-directory pdoc-html tmis
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov

      - name: Upload security scan reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            backend/bandit-report.txt
            backend/pip-audit-report.json

      - name: Upload generated API docs
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-docs
          path: backend/pdoc-html

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Security scan - dependency vulnerabilities (npm audit)
        run: npm audit --audit-level=high
        continue-on-error: true
